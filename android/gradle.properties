org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Kotlin's incremental-compilation cache computes relative paths between the
# project directory and dependency sources in the Gradle/pub cache; on
# Windows this throws (`this and base files have different roots`) whenever
# those two live on different drive letters, which is only reproducible on
# a local multi-drive Windows machine, not CI's single-drive Linux runners.
# Disabling incremental compilation trades some rebuild speed for a build
# that actually completes here; harmless everywhere else.
kotlin.incremental=false
